name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # First pass with zero optional dependencies installed — this is the
      # configuration erd.py promises to work in, so the optional-dep tests
      # must skip cleanly rather than fail.
      - name: Unit tests (no optional dependencies)
        run: python3 -m unittest discover -s tests

      - name: Install optional dependencies + browser
        run: |
          pip install playwright openpyxl pyyaml
          playwright install --with-deps chromium

      - name: Full test suite (browser E2E + optional-dep tests)
        run: python3 -m unittest discover -s tests -v

      # The demo HTML is a committed build artifact of erd.py + gen_demo.py;
      # regeneration is byte-deterministic, so any drift means someone changed
      # the generator without re-running it. PNGs (screenshot.png, img/*) are
      # rendering-dependent and NOT diff-checked — gen_shots.py is only smoke-
      # tested, and the diff check below is pinned to index.html.
      # erd.py is a committed build artifact of src/erdscope/core.py +
      # viewer.html (the ~3,600-line embedded viewer is kept out of the Python
      # in its own file). The build is a pure textual inline, so any drift means
      # someone edited erd.py directly instead of the source, or forgot to
      # rebuild.
      - name: erd.py is built from src/erdscope/
        run: python3 tools/build_single_file.py --check

      - name: Demo is regenerated and committed
        run: |
          python3 docs/gen_demo.py
          git diff --exit-code docs/index.html

      - name: Screenshot script smoke test
        run: python3 docs/gen_shots.py

  # The zero-dependency unittest pass (only — full E2E/playwright stays
  # latest-Python/Ubuntu-only, matching the `test` job above) also runs on
  # 3.9, the oldest version pyproject.toml's requires-python promises.
  # src/erdscope/ has been checked to be 3.9-syntax-compatible via AST, but
  # that doesn't catch a runtime-only incompatibility, hence actually running
  # the suite here.
  test-oldest-python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.9'
      - run: python3 -m unittest discover -s tests

  # erd.py is promised to run zero-dependency on Windows too, but nothing
  # previously exercised that — only Ubuntu ran CI. This does not attempt
  # browser E2E or the DB integration tests (both stay Ubuntu-only); it's
  # a minimal smoke pass to catch Windows-only failures (encoding defaults,
  # path separators) in the zero-dependency code path.
  windows-smoke:
    runs-on: windows-latest
    # erd.py itself always opens files with encoding='utf-8' explicitly, but
    # the test suite's many Path.read_text()/write_text() calls don't, so
    # they fall back to locale.getencoding() — cp1252 on this runner, which
    # can't decode the UTF-8 erd.py just wrote. PYTHONUTF8 makes that default
    # UTF-8 (PEP 540) without touching every call site; this is a test-harness
    # fix, not a product one, since the actual CLI never relied on the locale
    # default in the first place.
    env:
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Unit tests (no optional dependencies)
        run: python -m unittest discover -s tests
      - name: erd.py demo smoke test
        run: python erd.py demo -o out.html --no-open

  # Runs against real MySQL/PostgreSQL service containers, independently of
  # (and in parallel with) the `test` job above. tests/test_db_integration.py
  # skips itself cleanly (unittest.skipUnless) whenever the ERDSCOPE_IT_*_URL
  # env vars below aren't set, which is also why it's harmless for `test`'s
  # zero-optional-dependency `unittest discover` pass to pick the file up too.
  db-integration:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -uroot -proot --silent"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: pg
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Python DB drivers + openpyxl
        run: pip install pymysql "psycopg[binary]" openpyxl

      - name: Ensure mysql/psql CLI clients are available (CLI-fallback path)
        run: |
          need_update=0
          command -v mysql >/dev/null || need_update=1
          command -v psql >/dev/null || need_update=1
          if [ "$need_update" = 1 ]; then
            sudo apt-get update
          fi
          command -v mysql >/dev/null || sudo apt-get install -y mysql-client
          command -v psql >/dev/null || sudo apt-get install -y postgresql-client

      - name: MySQL/PostgreSQL integration tests
        env:
          ERDSCOPE_IT_MYSQL_URL: mysql://root:root@127.0.0.1:3306/erdscope_it
          ERDSCOPE_IT_POSTGRES_URL: postgres://postgres:pg@127.0.0.1:5432/erdscope_it
        run: python3 -m unittest tests.test_db_integration -v
