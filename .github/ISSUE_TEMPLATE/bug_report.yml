name: Bug report
description: Something in erdscope isn't working as expected
labels: ["bug"]
body:
  - type: input
    id: erdscope-version
    attributes:
      label: erdscope version
      description: Output of `erdscope --version` (or `python erd.py --version`)
      placeholder: erdscope 0.9.0
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: Output of `python3 --version`
      placeholder: Python 3.11.6
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS
      placeholder: macOS 14.5 / Ubuntu 22.04 / Windows 11
    validations:
      required: true

  - type: checkboxes
    id: input-kind
    attributes:
      label: Input source(s) involved
      description: Select every source you used to reproduce this (database, code, or config).
      options:
        - label: MySQL
        - label: PostgreSQL
        - label: SQLite
        - label: Rails (--models / sources rails.models)
        - label: rails.schema (db/schema.rb)
        - label: Prisma
        - label: Django
        - label: SQLAlchemy
        - label: Laravel
        - label: "Config file (tables: / relations: / notes: / groups:)"
        - label: "DBML input (sources[].type: dbml)"
        - label: "Mermaid input (sources[].type: mermaid.er)"

  - type: textarea
    id: command
    attributes:
      label: Command run
      description: >-
        The erdscope/erd.py command line you ran. Remove any secrets first
        (password, hostnames/credentials you don't want public) — a URL
        shape like `mysql://readonly@HOST/db` is enough.
      render: shell
      placeholder: erdscope mysql://readonly@HOST/dbname --models ./app
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction input
      description: >-
        The smallest schema/model/config snippet that reproduces the issue —
        e.g. one table's DDL, one model class, or the relevant config
        fragment. If the schema itself is sensitive, a synthetic
        stand-in that still triggers the bug is fine.
      render: text
    validations:
      required: false

  - type: textarea
    id: actual
    attributes:
      label: Actual result
      description: What happened — error message, wrong diagram content, etc.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected result
      description: What you expected to happen instead.
    validations:
      required: true
