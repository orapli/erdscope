<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="400" viewBox="0 0 1080 400" role="img" aria-labelledby="title desc">
  <title id="title">erdscope input flow</title>
  <desc id="desc">Database, application code, and config merge through erdscope into interactive HTML and Excel outputs</desc>
