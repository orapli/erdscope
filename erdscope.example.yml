# Sample erdscope config file, based on the schema behind the live demo
# (docs/gen_demo.py — a small e-commerce shop: users, products, orders...).
#
# To use it for real: copy to .erdscope.json or .erdscope.yml (dot-prefixed)
# in the directory you run `erd.py` from and it's picked up automatically,
# no --config needed. YAML comments like this one only work if PyYAML is
# installed — .erdscope.json (no comments, since JSON has none) always works
# with zero dependencies. An explicit CLI flag always overrides the same key
# here (including the DB connection, if you pass the URL directly on the CLI).
#
# One file per database (erdscope.staging.yml, erdscope.prod.yml, ...) is the
# intended way to point --config at different targets. There's deliberately
# no password field — engine/host/port/user/database are separate on purpose,
# so there's nowhere to paste a password into. Leave it out here the same way
# you would on the CLI: MYSQL_PWD/PGPASSWORD, ~/.my.cnf/~/.pgpass, or the
# interactive prompt.
# engine: postgres   # mysql (default) or postgres
host: 127.0.0.1
port: 3306           # with engine: postgres the default becomes 5432
user: readonly
database: demo_shop

output: erd.html
max_rows: 15

# Point at a Rails/Prisma/Django project to merge association semantics
# (has_many :through, polymorphic, ...) on top of the DB truth.
# models: ../myapp

# `sources:` is the typed alternative to `models:` above — each entry names
# its own `type`, so nothing needs auto-detecting and several inputs can be
# declared explicitly and unambiguously. rails.schema statically parses a
# Rails db/schema.rb (columns, indexes, real FKs — no live DB needed);
# rails.project is a macro for a whole Rails app root that expands to both
# the rails.schema (db/schema.rb) and rails.models (app/models) halves.
# Authority order: Config > live DB > rails.schema > models.
# sources:
#   - id: schema
#     type: rails.schema
#     path: ../myapp/db/schema.rb
#   - id: app
#     type: rails.project
#     path: ../myapp

# Also write a table-definition workbook alongside the HTML.
# excel: table_definitions.xlsx

# Off by default on purpose: guessing relations from *_id column names can
# be wrong. The demo turns it on because activity_logs.user_id has no real
# FK constraint (deliberately, to show what an inferred edge looks like).
infer_fk: true

# only: ["user*", "order*"]
# exclude: ["*_logs"]

# Rails only, and only needed when static analysis can't resolve a model's
# table itself (e.g. table_name set inside a concern that lives in a gem).
# table_map:
#   Widget: crm_widgets

# Manually declare relations no source (real FK, *_id inference, or --models
# code parsing) can find. Works even with no --models at all. Nothing in
# this demo schema actually needs one (every FK fits a naming convention),
# so the entries below are illustrative and left commented out — uncomment
# and adapt table/column/references to your own schema's odd cases.
relations: []
  # - table: orders
  #   column: buyer_ref        # imagine a column that doesn't fit *_id
  #   references: users
  #   name: buyer
  #
  # # one_to_one forces has_one (1:1) rendering even without a DB unique
  # # constraint on the column:
  # - table: shipments
  #   column: order_id
  #   references: orders
  #   one_to_one: true
