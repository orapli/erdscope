# Sample erdscope config file, based on the schema behind the live demo
# (docs/gen_demo.py — a small e-commerce shop: users, products, orders...).
#
# To use it for real: copy to .erdscope.json or .erdscope.yml (dot-prefixed)
# in the directory you run `erd.py` from and it's picked up automatically,
# no --config needed. YAML comments like this one only work if PyYAML is
# installed — .erdscope.json (no comments, since JSON has none) always works
# with zero dependencies. An explicit CLI flag always overrides the same key
# here (including the DB connection, if you pass the URL directly on the CLI).
#
# One file per database (erdscope.staging.yml, erdscope.prod.yml, ...) is the
# intended way to point --config at different targets. There's deliberately
# no password field — engine/host/port/user/database are separate on purpose,
# so there's nowhere to paste a password into. Leave it out here the same way
# you would on the CLI: MYSQL_PWD/PGPASSWORD, ~/.my.cnf/~/.pgpass, or the
# interactive prompt.
# engine: postgres   # mysql (default) or postgres
host: 127.0.0.1
port: 3306           # with engine: postgres the default becomes 5432
user: readonly
database: demo_shop

output: erd.html
max_rows: 15

# Point at a Rails/Prisma/Django project to merge association semantics
# (has_many :through, polymorphic, ...) on top of the DB truth.
# models: ../myapp

# `sources:` is the typed alternative to `models:` above — each entry names
# its own `type`, so nothing needs auto-detecting and several inputs can be
# declared explicitly and unambiguously. rails.schema statically parses a
# Rails db/schema.rb (columns, indexes, real FKs — no live DB needed);
# rails.project is a macro for a whole Rails app root that expands to both
# the rails.schema (db/schema.rb) and rails.models (app/models) halves.
# Authority order: Config > live DB > rails.schema > models.
# A typed source that parses NOTHING is a hard error (never a silently empty
# diagram); add `allow_empty: true` to a source to accept an empty result.
#
# The optional top-level `version: 1` is a config-format marker — currently
# the only supported value, with no other effect; it's for future
# config-format changes to key off.
# version: 1
# sources:
#   - id: schema
#     type: rails.schema
#     path: ../myapp/db/schema.rb
#   - id: app
#     type: rails.project
#     path: ../myapp

# Also write a table-definition workbook alongside the HTML.
# excel: table_definitions.xlsx

# Off by default on purpose: guessing relations from *_id column names can
# be wrong. The demo turns it on because activity_logs.user_id has no real
# FK constraint (deliberately, to show what an inferred edge looks like).
infer_fk: true

# only: ["user*", "order*"]
# exclude: ["*_logs"]

# Rails only, and only needed when static analysis can't resolve a model's
# table itself (e.g. table_name set inside a concern that lives in a gem).
# table_map:
#   Widget: crm_widgets

# Manually declare relations no source (real FK, *_id inference, or --models
# code parsing) can find. Works even with no --models at all. Nothing in
# this demo schema actually needs one (every FK fits a naming convention),
# so the entries below are illustrative and left commented out — uncomment
# and adapt table/column/references to your own schema's odd cases.
relations: []
  # - table: orders
  #   column: buyer_ref        # imagine a column that doesn't fit *_id
  #   references: users
  #   name: buyer
  #
  # # one_to_one forces has_one (1:1) rendering even without a DB unique
  # # constraint on the column:
  # - table: shipments
  #   column: order_id
  #   references: orders
  #   one_to_one: true

# `notes:` attaches design decisions / operational rules / ADR links to the
# diagram itself (notes Phase 1) — a table, a specific relation, or the whole
# diagram. Every note needs a config-unique `id` and non-empty `text`; `title`
# and `links` are optional. Notes are validated against the FINAL merged
# schema (after DB/--models/config.tables are all combined) and rendered as
# plain, escaped text in the viewer — no Markdown, no raw HTML. Link URLs must
# be http:// or https://.
#
# notes:
#   - id: user-retention
#     target: { type: table, table: users }
#     title: Retention policy
#     text: Suspended accounts are kept for 1 year, then anonymized.
#     links:
#       - { label: ADR-004, url: https://example.com/adr/004 }
#
#   # relation notes are keyed by the identity of a SPECIFIC association, not
#   # a display label: `source_table` is the side that HOLDS the association
#   # (the belongs_to/FK-holding side for a belongs_to, the owning side for a
#   # has_many) — the same side the viewer's right-pane Associations list
#   # shows it on. `foreign_key`/`name`/`assoc_type`/`through`/`polymorphic` are
#   # optional narrowing keys, only needed when a table has more than one
#   # relation to the same target (e.g. two aliased belongs_to on different FK
#   # columns, or a has_many and a has_one that share a name+target — narrow
#   # those with `assoc_type: has_many` etc.). An ambiguous match without them
#   # is a hard error, on purpose.
#   - id: order-ownership
#     target:
#       type: relation
#       source_table: orders
#       target_table: users
#       foreign_key: user_id
#       # assoc_type: belongs_to   # optional: has_many | belongs_to | has_one | has_and_belongs_to_many
#     text: Orders are kept after a user is anonymized (financial record-keeping).
#
#   - id: diagram-conventions
#     target: { type: global }
#     title: How to read this diagram
#     text: The dotted amber edge under activity_logs.user_id is inferred, not a real FK.

# `groups:` draws a rounded frame around a set of related tables (groups
# Phase 1) — purely visual, no effect on layout/merge/associations. Every
# group needs a config-unique `id` and a non-empty `tables` list; `title`
# (defaults to `id` if omitted) and `color` (hex only, e.g. "#0d9488") are
# optional. Groups are validated against the FINAL merged schema, same as
# notes above. A table may belong to at most ONE group — claiming the same
# table from two groups is a hard error, on purpose (Phase 1 doesn't support
# overlapping membership). In the viewer, drag a group's title chip to move
# every member together; a "Groups" toolbar toggle shows/hides the frames.
#
# groups:
#   - id: billing
#     title: Billing
#     tables: [invoices, payments, coupons]
#     color: "#0d9488"
#
#   - id: catalog
#     tables: [products, categories, product_categories]
